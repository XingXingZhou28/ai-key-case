<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>一键输入 · 微信回复</title>
<link rel="stylesheet" href="assets/ai-water-interactions.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100%; height: 100vh;
  background: #1a1a1a;
  display: flex; align-items: center; justify-content: center;
  font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
  overflow: hidden;
}

.scene-wrapper {
  position: relative;
  width: 1440px; height: 900px;
  transform-origin: center center;
}

.scene {
  position: absolute; top: 0; left: 0;
  width: 1440px; height: 900px;
  background: #fff;
  overflow: hidden;
  cursor: default;
}

.bg-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(205.744deg, rgb(245,244,237) 8.65%, rgb(214,206,151) 78.224%);
  opacity: 0.2;
  pointer-events: none;
}

/* ===== 微信窗口 left:242 top:120 w:956 h:640 ===== */
.wc-window {
  position: absolute;
  left: 242px; top: 120px;
  width: 956px; height: 640px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(178,176,160,0.5);
  display: flex;
}

/* 左侧 sidebar w:84 */
.wc-sidebar {
  width: 84px;
  background: #ededed;
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center;
  padding: 40px 0 24px;
  position: relative;
}
.wc-sidebar .avatar-wrap {
  width: 36px; height: 36px;
  border-radius: 50%; overflow: hidden;
  margin-bottom: 36px;
}
.wc-sidebar .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
.wc-nav-icons {
  display: flex; flex-direction: column; gap: 24px; align-items: center;
}
.wc-nav-icons img { width: 24px; height: 24px; }
.wc-sidebar .settings-icon {
  position: absolute; bottom: 24px; left: 30px;
  width: 24px; height: 24px;
}

/* 联系人列表 w:280 */
.wc-contacts-list {
  width: 280px;
  background: #f5f5f5;
  flex-shrink: 0;
  position: relative;
}
.wc-contacts-list .bg-img {
  position: absolute; top: 0; left: 0;
  width: 320px; height: 640px;
}
.wc-contacts-list .search-bar {
  position: absolute;
  top: 30px; left: 24px;
  width: 232px; height: 46px;
  background: #e9e9e9; border-radius: 8px;
}
.wc-contacts-items {
  position: absolute;
  top: 97px; left: 0;
  display: flex; flex-direction: column; gap: 8px;
}
.wc-contact-item { width: 280px; height: 80px; }
.wc-contact-item img { width: 100%; height: 100%; }
.wc-vert-divider {
  position: absolute; top: 0; left: 280px;
  width: 1px; height: 640px;
}
.wc-vert-divider img { width: 100%; height: 100%; }

/* 聊天区 */
.wc-chat {
  flex: 1;
  background: #f5f5f5;
  display: flex; flex-direction: column;
  position: relative;
}
.wc-chat-header {
  height: 76px; background: #fff;
  display: flex; align-items: center; padding: 0 34px;
  font-size: 20px; font-weight: 600; color: #000;
  flex-shrink: 0;
  border-bottom: 1px solid #d9d9d9;
}
.wc-chat-body {
  flex: 1;
  padding: 20px 24px;
  display: flex; flex-direction: column; gap: 16px;
  overflow: hidden;
}
.msg-row { display: flex; align-items: flex-start; gap: 10px; }
.msg-row.me { flex-direction: row-reverse; }
.msg-avatar { width: 32px; height: 32px; border-radius: 4.741px; overflow: hidden; flex-shrink: 0; position: relative; }
.msg-avatar img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
/* 对方头像是大图局部裁切，用 Figma 精确值 */
.msg-avatar.other img {
  position: absolute;
  height: 2883.23%;
  left: -1233.33%;
  top: -1582.36%;
  width: 2940.74%;
  max-width: none;
}
.msg-bubble {
  max-width: 320px; background: #fff;
  border-radius: 0 6px 6px 6px;
  padding: 10px 14px;
  font-size: 16px; line-height: 26px; color: #000;
}
.msg-row.me .msg-bubble { background: #95ec69; border-radius: 6px 0 6px 6px; }
.file-bubble { background: #fff; border-radius: 0 6px 6px 6px; overflow: hidden; width: 204px; }
.file-bubble img { width: 100%; height: auto; display: block; }

/* 输入区 h:161 */
.wc-input-area {
  height: 161px;
  flex-shrink: 0;
  border-top: 1px solid #d9d9d9;
  background: #fff;
  position: relative;
}
.wc-input-toolbar {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px 0;
}
.wc-input-toolbar img { width: 24px; height: 24px; }
.wc-input-box {
  padding: 8px 16px;
  font-size: 18px; line-height: 32px;
  color: #999;
}
.wc-input-box.typing { color: #000; }

/* AI 回复覆盖层（state 3）：覆盖输入框区域 */
.wc-ai-reply-overlay {
  position: absolute;
  left: 0; top: 48px;
  width: 100%;
  background: #fff;
  padding: 0 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}
.wc-ai-reply-overlay.show { opacity: 1; }
#wc-ai-reply-text {
  font-size: 18px;
  line-height: 29px;
  color: #000;
  width: 542px;
}

/* ===== AI 胶囊 w:462.692 h:60 bottom:36 ===== */
.wc-capsule {
  position: absolute;
  bottom: 36px;
  left: calc(50% + 0.5px);
  transform: translateX(-50%);
  height: 60px;
  border-radius: 115.385px;
  overflow: hidden;
  white-space: nowrap;
  opacity: 0;
  width: 60px;
  transition: opacity 0.25s, width 0.45s cubic-bezier(0.34,1.4,0.64,1);
  pointer-events: none;
  z-index: 20;
}
.wc-capsule.show {
  opacity: 1;
  width: 462.692px;
  pointer-events: auto;
}
.capsule-bg-img {
  position: absolute; left: 0; top: 0;
  width: 462.692px; height: 60px;
  pointer-events: none;
  border-radius: 115.385px;
}

/* 胶囊内 orb — 与 index.html 语音胶囊完全一致 */
.capsule-mini-orb {
  position: absolute;
  left: -2.92px; top: -2px;
  width: 63px; height: 64px;
}
.cmo-glow1 {
  position: absolute;
  width: 200.769px; height: 200.769px;
  top: 50%; left: calc(50% + 0.27px);
  transform: translate(-50%, -50%);
  opacity: 0.3; pointer-events: none;
}
.cmo-glow2 {
  position: absolute;
  width: 111.264px; height: 111.264px;
  top: 50%; left: calc(50% + 0.27px);
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.cmo-glow3 {
  position: absolute;
  width: 61.319px; height: 61.319px;
  top: 50%; left: calc(50% + 0.27px);
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.cmo-circle {
  position: absolute;
  width: 37.58px; height: 37.58px;
  top: 50%; left: calc(50% + 0.27px);
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: linear-gradient(180deg, #fff 0%, #c3cfff 100%);
  border: 1px solid rgba(255,255,255,0.9);
  box-shadow: 0 0 14px rgba(80,100,240,0.28),
              inset 0 3px 4px rgba(255,255,255,0.85),
              inset 0 -2px 3px rgba(195,207,255,0.7);
}
.cmo-ring2 {
  position: absolute;
  width: 42.5px; height: 42.5px;
  top: 50%; left: calc(50% + 0.27px);
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.cmo-ring3 {
  position: absolute;
  width: 42.5px; height: 42.5px;
  top: 50%; left: calc(50% + 0.27px);
  transform: translate(-50%, -50%) rotate(90deg);
  pointer-events: none;
}
.cmo-bars {
  position: absolute;
  left: 22.54px; top: 22.77px;
  width: 18.462px; height: 18.462px;
  display: flex; align-items: center; justify-content: center; gap: 2.261px;
}
.cmo-bars span {
  display: block; width: 1.884px; border-radius: 2px;
  background: linear-gradient(180deg, #708eff 0%, #335eff 100%);
  animation: eqAnim 0.6s ease-in-out infinite;
}
.cmo-bars span:nth-child(1){ height:4.521px; animation-delay:0s }
.cmo-bars span:nth-child(2){ height:9.042px; animation-delay:0.1s }
.cmo-bars span:nth-child(3){ height:13.564px; animation-delay:0.2s }
.cmo-bars span:nth-child(4){ height:9.042px; animation-delay:0.3s }
.cmo-bars span:nth-child(5){ height:4.521px; animation-delay:0.4s }
@keyframes eqAnim {
  0%,100%{ transform:scaleY(1) } 50%{ transform:scaleY(0.4) }
}

.capsule-label {
  position: absolute;
  left: 61.15px; top: 50%;
  transform: translateY(-50%);
  font-size: 18.462px; line-height: 30px;
  color: rgba(255,255,255,0.92);
  white-space: nowrap;
}

/* ===== AI 键 bottom:36 ===== */
.ai-orb-wc {
  position: absolute;
  bottom: 36px; left: 50%;
  transform: translateX(-50%);
  width: 32px; height: 32px;
  cursor: pointer;
  z-index: 10;
  transition: opacity 0.5s ease;
}
.ai-orb-wc.hidden { opacity: 0; pointer-events: none; }
.ai-orb-wc:hover { filter: brightness(1.1); }
.ai-orb-wc:active { opacity: 0.7; }
.ai-orb-wc .orb-outer { position:absolute;width:72px;height:72px;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.3;transition:opacity 0.3s; }
.ai-orb-wc .orb-mid   { position:absolute;width:60px;height:60px;top:50%;left:50%;transform:translate(-50%,-50%); }
.ai-orb-wc .orb-inner { position:absolute;width:48px;height:48px;top:50%;left:50%;transform:translate(-50%,-50%); }
.ai-orb-wc .orb-icon  { position:absolute;width:48px;height:48px;top:50%;left:50%;transform:translate(-50%,-50%);transition:opacity 0.25s; }

/* orb 呼吸动效 */
@keyframes orbBreathe {
  0%,100% { transform: translate(-50%,-50%) scale(1);     opacity: var(--orb-base-op); }
  50%      { transform: translate(-50%,-50%) scale(1.22);  opacity: calc(var(--orb-base-op) * 1.7); }
}
.ai-orb-wc.breathing .orb-outer {
  --orb-base-op: 0.25;
  animation: orbBreathe 2.6s ease-in-out infinite;
  transition: none;
}
.ai-orb-wc.breathing .orb-mid {
  --orb-base-op: 0.5;
  animation: orbBreathe 2.6s ease-in-out infinite 0.15s;
  transition: none;
}
.ai-orb-wc.breathing .orb-inner {
  --orb-base-op: 0.82;
  animation: orbBreathe 2.6s ease-in-out infinite 0.3s;
  transition: none;
}

/* 提示文字 */
.hint {
  position: absolute;
  bottom: 8px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: rgba(0,0,0,0.28);
  white-space: nowrap; pointer-events: none;
  transition: opacity 0.3s;
}
.hint.hide { opacity: 0; }
</style>
</head>
<body>

<div class="scene-wrapper" id="wrapper">
  <div class="scene" id="scene" onclick="handleClick(event)">
    <div class="bg-gradient"></div>

    <!-- 微信窗口 -->
    <div class="wc-window">

      <!-- 左侧 sidebar -->
      <div class="wc-sidebar">
        <div class="avatar-wrap">
          <img src="assets/wc-sidebar-avatar.png" alt="">
        </div>
        <div class="wc-nav-icons">
          <img src="assets/wc-sidebar-chat.svg" alt="">
          <img src="assets/wc-sidebar-contacts.svg" alt="">
          <img src="assets/wc-sidebar-moments.svg" alt="">
        </div>
        <img class="settings-icon" src="assets/wc-sidebar-settings.svg" alt="">
      </div>

      <!-- 联系人列表 -->
      <div class="wc-contacts-list">
        <img class="bg-img" src="assets/wc-contacts-bg.svg" alt="">
        <div class="search-bar"></div>
        <div class="wc-contacts-items">
          <div class="wc-contact-item"><img src="assets/wc-contact-item1.svg" alt=""></div>
          <div class="wc-contact-item"><img src="assets/wc-contact-item2.svg" alt=""></div>
          <div class="wc-contact-item"><img src="assets/wc-contact-item3.svg" alt=""></div>
          <div class="wc-contact-item"><img src="assets/wc-contact-item4.svg" alt=""></div>
        </div>
        <div class="wc-vert-divider"><img src="assets/wc-divider2.svg" alt=""></div>
      </div>

      <!-- 聊天区 -->
      <div class="wc-chat">
        <div class="wc-chat-header">报价单</div>
        <div class="wc-chat-body">
          <div class="msg-row me">
            <div class="msg-avatar"><img src="assets/wc-msg-me-avatar.png" alt=""></div>
            <div class="msg-bubble">宇总，我把报价单发您</div>
          </div>
          <div class="msg-row me">
            <div class="msg-avatar"><img src="assets/wc-msg-me-avatar.png" alt=""></div>
            <div class="file-bubble"><img src="assets/wc-file-preview.png" alt=""></div>
          </div>
          <div class="msg-row other">
            <div class="msg-avatar other"><img src="assets/wc-msg-other-avatar.png" alt=""></div>
            <div class="msg-bubble">周经理，你们报价比别家贵 30% 啊</div>
          </div>
        </div>

        <!-- 输入区 -->
        <div class="wc-input-area">
          <div class="wc-input-toolbar">
            <img src="assets/wc-icon-emoji.svg" alt="">
            <img src="assets/wc-icon-scissors.svg" alt="">
            <img src="assets/wc-icon-folder.svg" alt="">
          </div>
          <div class="wc-input-box" id="wc-input">输入消息…</div>
          <!-- AI 回复覆盖层 -->
          <div class="wc-ai-reply-overlay" id="wc-ai-reply">
            <div id="wc-ai-reply-text"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- AI 胶囊 -->
    <div class="wc-capsule" id="wc-capsule">
      <img class="capsule-bg-img" src="assets/wc-capsule-bg2.svg" alt="">
      <div class="capsule-mini-orb">
        <img class="cmo-glow1" src="assets/orb-rec-outer.png" alt="">
        <img class="cmo-glow2" src="assets/orb-rec-mid.png" alt="">
        <img class="cmo-glow3" src="assets/orb-rec-inner.png" alt="">
        <div class="cmo-circle"></div>
        <img class="cmo-ring2" src="assets/orb-rec-ring2.svg" alt="">
        <img class="cmo-ring3" src="assets/orb-rec-ring3.svg" alt="">
        <div class="cmo-bars">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
      <span class="capsule-label">回复客户，委婉说明我们价格高是因为服务好</span>
    </div>

    <!-- AI 键 -->
    <div class="ai-orb-wc" id="wc-orb">
      <img class="orb-outer" src="assets/orb-outer.png" alt="">
      <img class="orb-mid"   src="assets/orb-mid.png" alt="">
      <img class="orb-inner" src="assets/orb-inner.png" alt="">
      <img class="orb-icon"  src="assets/orb-icon.svg" alt="">
    </div>

    <div class="hint" id="hint">点击 AI 键体验</div>
  </div>
</div>

<script src="assets/ai-water-interactions.js"></script>
<script>
function scaleScene() {
  const wrapper = document.getElementById('wrapper');
  const scale = Math.min((window.innerWidth - 32) / 1440, (window.innerHeight - 32) / 900);
  wrapper.style.transform = `scale(${scale})`;
}
scaleScene();
window.addEventListener('resize', scaleScene);

// ---- 水波纹 ----
let rippleLayer = null;

function buildRippleBg(ctx, w, h) {
  const g = ctx.createLinearGradient(0, 0, w * 0.6, h);
  g.addColorStop(0, '#f5f4ed');
  g.addColorStop(1, '#d6ce97');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
  // 微信窗口白卡区域
  ctx.fillStyle = 'rgba(255,255,255,0.82)';
  ctx.fillRect(w*(242/1440), h*(120/900), w*(956/1440), h*(640/900));
}

function initRipple() {
  if (rippleLayer) { rippleLayer.destroy(); rippleLayer = null; }
  rippleLayer = AIWater.createWaterRippleLayer({
    target: document.getElementById('scene'),
    fullScreen: false,
    autoPlay: false,
    loop: false,
    duration: 1400,
    sourceX: 0.5,
    sourceY: 1.06,
    opacity: 0.92,
    scale: 0.62
  });
  rippleLayer.setBackground(buildRippleBg);
}

function playRipple(onComplete) {
  if (!rippleLayer) initRipple();
  rippleLayer.looping = false;
  rippleLayer.play();
  setTimeout(() => { onComplete?.(); }, 1500);
}

// ---- 主流程 ----
let state = 0, timer = null;
const AI_REPLY = '宇总，理解您的顾虑。我方定价略高于同行，只因交付、品控与服务均执行更高标准。';

function handleClick(e) {
  if (state === 3) resetFlow();
}

function startFlow() {
  playRipple(() => {
    const orb = document.getElementById('wc-orb');
    orb.classList.add('breathing');

    timer = setTimeout(() => {
      orb.classList.remove('breathing');
      orb.classList.add('hidden');
      document.getElementById('hint').classList.add('hide');

      timer = setTimeout(() => {
        document.getElementById('wc-capsule').classList.add('show');

        timer = setTimeout(() => {
          document.getElementById('wc-capsule').classList.remove('show');

          timer = setTimeout(() => {
            // 直接显示 AI 回复覆盖层，不在输入框打字
            const replyEl = document.getElementById('wc-ai-reply-text');
            replyEl.textContent = '';
            document.getElementById('wc-ai-reply').classList.add('show');

            typeEl(replyEl, AI_REPLY, 30, () => { state = 3; });
          }, 500);
        }, 1800);
      }, 400);
    }, 1500);
  });
}

function typeEl(el, text, speed, onDone) {
  let i = 0;
  function next() {
    if (i < text.length) {
      el.textContent += text[i++];
      timer = setTimeout(next, speed);
    } else {
      onDone?.();
    }
  }
  next();
}

function resetFlow() {
  clearTimeout(timer);
  state = 0;
  if (rippleLayer) rippleLayer.stop();

  const orb = document.getElementById('wc-orb');
  orb.classList.remove('breathing', 'hidden');
  document.getElementById('wc-capsule').classList.remove('show');
  document.getElementById('wc-ai-reply').classList.remove('show');
  document.getElementById('wc-ai-reply-text').textContent = '';
  document.getElementById('hint').classList.remove('hide');

  // 重置后重新自动播放
  startFlow();
}

// 页面加载自动开始
initRipple();
startFlow();
</script>
</body>
</html>
