<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI 键 Case</title>
<link rel="stylesheet" href="assets/ai-water-interactions.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 100%; height: 100vh;
  background: #1a1a1a;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
  overflow: hidden;
  gap: 16px;
}

.tabs {
  display: flex; gap: 8px;
  z-index: 10;
  flex-shrink: 0;
}
.tab {
  padding: 6px 20px;
  border-radius: 20px;
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.15);
  transition: all 0.2s;
  user-select: none;
}
.tab.active {
  background: rgba(255,255,255,0.15);
  color: #fff;
  border-color: rgba(255,255,255,0.3);
}

.scene-wrapper {
  position: relative;
  width: 1440px;
  height: 900px;
  transform-origin: center center;
  flex-shrink: 0;
}

/* 每个场景固定 1440×900 */
.scene {
  position: absolute;
  top: 0; left: 0;
  width: 1440px; height: 900px;
  overflow: hidden;
  display: none;
}
.scene.active { display: block; }

/* ===================== SCENE 1: 一键语音 ===================== */
#scene-voice {
  background: #fff;
}
#scene-voice .bg-gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(205.744deg, rgb(245,244,237) 8.65%, rgb(214,206,151) 78.224%);
  opacity: 0.2;
}

/* PDF 白卡 left:300 top:120 w:840 */
.voice-card {
  position: absolute;
  left: 300px; top: 120px;
  width: 840px; height: 780px;
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 0 40px rgba(178,176,160,0.5);
  overflow: hidden;
}
/* 内层容器 left:54 top:34 w:731 h:812，overflow hidden 裁掉浏览器 chrome */
.voice-card .pdf-inner {
  position: absolute;
  left: 54px; top: 34px;
  width: 731px; height: 812px;
  border-radius: 20px;
  overflow: hidden;
  pointer-events: none;
}
/* 图片用 Figma 参数：w:235.29% h:125.2% left:-66.34% top:-24.72% */
.voice-card .pdf-inner img {
  position: absolute;
  width: 235.29%;
  height: 125.2%;
  left: -66.34%;
  top: -24.72%;
  max-width: none;
}

/* AI 键 bottom:36 left:50% — Figma: size:32 但圆光晕 48 */
.ai-orb {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  width: 32px; height: 32px;
  cursor: pointer;
  transition: opacity 0.5s ease;
}
.ai-orb.hidden { opacity: 0; pointer-events: none; }
.ai-orb:hover { filter: brightness(1.1); }
.ai-orb:active { opacity: 0.7; }

/* 三层光晕 */
.ai-orb .orb-outer {
  position: absolute;
  width: 72px; height: 72px;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  opacity: 0.3;
  transition: opacity 0.3s;
}
.ai-orb .orb-mid {
  position: absolute;
  width: 60px; height: 60px;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
}
.ai-orb .orb-inner {
  position: absolute;
  width: 48px; height: 48px;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
}
.ai-orb .orb-icon {
  position: absolute;
  width: 48px; height: 48px;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  transition: opacity 0.25s;
}

/* 录音状态：替换为新的 glow 图层 + 均衡器图标 */
.ai-orb .orb-rec-outer {
  position: absolute;
  width: 72px; height: 72px;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  opacity: 0;
  transition: opacity 0.3s;
}
.ai-orb .orb-rec-mid {
  position: absolute;
  width: 60px; height: 60px;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  opacity: 0;
  transition: opacity 0.3s;
}
.ai-orb .orb-rec-inner {
  position: absolute;
  width: 48px; height: 48px;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  opacity: 0;
  transition: opacity 0.3s;
}
/* 均衡器图标 */
.orb-eq {
  position: absolute;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  display: flex; align-items: center; gap: 2.5px;
  opacity: 0;
  transition: opacity 0.25s;
  pointer-events: none;
}
.orb-eq span {
  display: block;
  width: 2px; border-radius: 2px;
  background: linear-gradient(180deg, #708eff 0%, #335eff 100%);
  animation: eqAnim 0.6s ease-in-out infinite;
}
.orb-eq span:nth-child(1){ height:5px;  animation-delay:0s }
.orb-eq span:nth-child(2){ height:10px; animation-delay:0.1s }
.orb-eq span:nth-child(3){ height:14px; animation-delay:0.2s }
.orb-eq span:nth-child(4){ height:10px; animation-delay:0.3s }
.orb-eq span:nth-child(5){ height:5px;  animation-delay:0.4s }
@keyframes eqAnim {
  0%,100%{ transform:scaleY(1) } 50%{ transform:scaleY(0.4) }
}

/* idle 呼吸光晕 */
@keyframes orbBreathe {
  0%,100% { transform: translate(-50%,-50%) scale(1);    opacity: var(--orb-base-op); }
  50%      { transform: translate(-50%,-50%) scale(1.22); opacity: calc(var(--orb-base-op) * 1.7); }
}
.ai-orb.breathing .orb-outer {
  --orb-base-op: 0.25;
  animation: orbBreathe 2.6s ease-in-out infinite;
  transition: none;
}
.ai-orb.breathing .orb-mid {
  --orb-base-op: 0.5;
  animation: orbBreathe 2.6s ease-in-out infinite 0.15s;
  transition: none;
}
.ai-orb.breathing .orb-inner {
  --orb-base-op: 0.82;
  animation: orbBreathe 2.6s ease-in-out infinite 0.3s;
  transition: none;
}

/* recording 状态切换 */
.ai-orb.recording .orb-outer  { opacity: 0; }
.ai-orb.recording .orb-mid    { opacity: 0; }
.ai-orb.recording .orb-inner  { opacity: 0; }
.ai-orb.recording .orb-icon   { opacity: 0; }
.ai-orb.recording .orb-rec-outer { opacity: 0.3; }
.ai-orb.recording .orb-rec-mid   { opacity: 1; }
.ai-orb.recording .orb-rec-inner { opacity: 1; }
.ai-orb.recording .orb-eq        { opacity: 1; }

/* 语音胶囊：用 SVG 背景 + 迷你 orb 图标 */
.voice-capsule {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 60px;
  border-radius: 115px;
  overflow: hidden;
  opacity: 0;
  pointer-events: none;
  z-index: 20;
  transition: opacity 0.4s ease, width 0.5s cubic-bezier(0.34,1.2,0.64,1);
}
.voice-capsule.show {
  opacity: 1;
  width: 241px;
  pointer-events: auto;
}
.capsule-bg-img {
  position: absolute;
  left: 0; top: 0;
  width: 241px; height: 60px;
  pointer-events: none;
}
/* 胶囊内的迷你 orb 图标：left:-2.92 top:-2 w:63 h:64 */
.capsule-mini-orb {
  position: absolute;
  left: -2.92px; top: -2px;
  width: 63px; height: 64px;
}
.cmo-glow1 {
  position: absolute;
  width: 200.769px; height: 200.769px;
  top: 50%; left: calc(50% + 0.27px);
  transform: translate(-50%, -50%);
  opacity: 0.3;
  pointer-events: none;
}
.cmo-glow2 {
  position: absolute;
  width: 111.264px; height: 111.264px;
  top: 50%; left: calc(50% + 0.27px);
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.cmo-glow3 {
  position: absolute;
  width: 61.319px; height: 61.319px;
  top: 50%; left: calc(50% + 0.27px);
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.cmo-ring1 {
  position: absolute;
  width: 77.1px; height: 77.1px;
  top: 50%; left: calc(50% + 0.27px);
  transform: translate(-50%, -50%);
  pointer-events: none;
}
/* 用 CSS 圆替代有 SVG 滤镜的 ring1，避免发虚锯齿 */
.cmo-circle {
  position: absolute;
  width: 37.58px; height: 37.58px;
  top: 50%; left: calc(50% + 0.27px);
  transform: translate(-50%, -50%);
  border-radius: 50%;
  background: linear-gradient(180deg, #fff 0%, #c3cfff 100%);
  border: 1px solid rgba(255,255,255,0.9);
  box-shadow: 0 0 14px rgba(80,100,240,0.28),
              inset 0 3px 4px rgba(255,255,255,0.85),
              inset 0 -2px 3px rgba(195,207,255,0.7);
}
.cmo-ring2 {
  position: absolute;
  width: 42.5px; height: 42.5px;
  top: 50%; left: calc(50% + 0.27px);
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.cmo-ring3 {
  position: absolute;
  width: 42.5px; height: 42.5px;
  top: 50%; left: calc(50% + 0.27px);
  transform: translate(-50%, -50%) rotate(90deg);
  pointer-events: none;
}
/* 均衡器条：left:22.54 top:22.77 size:18.462 in icon container */
.cmo-bars {
  position: absolute;
  left: 22.54px; top: 22.77px;
  width: 18.462px; height: 18.462px;
  display: flex; align-items: center;
  justify-content: center;
  gap: 2.261px;
}
.cmo-bars span {
  display: block;
  width: 1.884px; border-radius: 2px;
  background: linear-gradient(180deg, #708eff 0%, #335eff 100%);
  animation: eqAnim 0.6s ease-in-out infinite;
}
.cmo-bars span:nth-child(1){ height:4.521px; animation-delay:0s }
.cmo-bars span:nth-child(2){ height:9.042px; animation-delay:0.1s }
.cmo-bars span:nth-child(3){ height:13.564px; animation-delay:0.2s }
.cmo-bars span:nth-child(4){ height:9.042px; animation-delay:0.3s }
.cmo-bars span:nth-child(5){ height:4.521px; animation-delay:0.4s }
.capsule-label {
  position: absolute;
  left: 61.15px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18.462px;
  line-height: 30px;
  color: rgba(255,255,255,0.92);
  white-space: nowrap;
}

/* AI 面板 right:60 top:335 w:382 */
.ai-result-panel {
  position: absolute;
  right: 60px; top: 335px;
  width: 382px;
  background: linear-gradient(180deg, #000 0%, rgba(0,0,0,0.95) 84%, rgba(0,0,0,0) 105%);
  border: 1px solid #46c0ff;
  border-radius: 26px;
  padding: 24px 24px 20px;
  opacity: 0;
  transform: translateX(24px) scale(0.96);
  transition: opacity 0.5s cubic-bezier(0.22,1,0.36,1), transform 0.5s cubic-bezier(0.22,1,0.36,1);
  pointer-events: none;
  z-index: 10;
}
.ai-result-panel.show {
  opacity: 1;
  transform: translateX(0) scale(1);
  pointer-events: auto;
}
.panel-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 14px;
}
.panel-header img.logo-mark { width: 20px; height: 20px; }
.panel-header img.logo-text { height: 14px; }
.panel-body {
  font-size: 17px;
  line-height: 32px;
  color: rgba(255,255,255,0.92);
  letter-spacing: 0.01em;
  min-height: 120px;
  margin-bottom: 18px;
}
.panel-input {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 20px;
  padding: 12px 14px;
  height: 52px;
}
.panel-input span {
  flex: 1;
  font-size: 14px;
  color: rgba(255,255,255,0.36);
}
.panel-input-icons {
  display: flex; gap: 10px; align-items: center;
}
.panel-input-icons .input-icon {
  width: 14px; height: 14px; display: block; flex-shrink: 0; opacity: 0.8;
}
.panel-mic-icon {
  position: relative; width: 18px; height: 18px; flex-shrink: 0;
}
.panel-mic-icon .mic-v {
  position: absolute; width: 3.63px; height: 6.47px; top: 3.82px; left: 7.19px;
}
.panel-mic-icon .mic-u {
  position: absolute; width: 8.67px; height: 6.34px; top: 7.77px; left: 4.67px;
}
.input-icon-divider {
  width: 1px; height: 12px; background: rgba(255,255,255,0.24); flex-shrink: 0;
}
.input-icon-send {
  width: 22px; height: 22px; border-radius: 11px;
  background: rgba(255,255,255,0.16);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* hint */
.hint {
  position: absolute;
  bottom: 8px; left: 50%; transform: translateX(-50%);
  font-size: 12px; color: rgba(255,255,255,0.3);
  white-space: nowrap; pointer-events: none;
  transition: opacity 0.3s;
}
.hint.hide { opacity: 0; }

/* ===================== SCENE 2: 一键输入（微信） ===================== */
#scene-input {
  background: #fff;
}
#scene-input .bg-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(205.744deg, rgb(245,244,237) 8.65%, rgb(214,206,151) 78.224%);
  opacity: 0.2;
}

/* 微信窗口 left:242 top:120 w:956 h:640 */
.wc-window {
  position: absolute;
  left: 242px; top: 120px;
  width: 956px; height: 640px;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(178,176,160,0.5);
  display: flex;
}

/* 左侧 sidebar w:84 */
.wc-sidebar {
  width: 84px;
  background: #ededed;
  flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center;
  padding: 40px 0 24px;
  gap: 0;
  position: relative;
}
.wc-sidebar .avatar-wrap {
  width: 36px; height: 36px; border-radius: 50%; overflow: hidden; margin-bottom: 36px;
}
.wc-sidebar .avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
.wc-nav-icons {
  display: flex; flex-direction: column; gap: 24px; align-items: center;
}
.wc-nav-icons img { width: 24px; height: 24px; }
.wc-sidebar .settings-icon {
  position: absolute; bottom: 24px; left: 30px;
  width: 24px; height: 24px;
}

/* 联系人列表 w:320（84+320=404 → 右边从365开始） */
.wc-contacts-list {
  width: 280px;
  background: #f5f5f5;
  flex-shrink: 0;
  position: relative;
}
/* 背景图（渐变+暗角） */
.wc-contacts-list .bg-img {
  position: absolute;
  top: 0; left: 0;
  width: 320px; height: 640px;
}
.wc-contacts-list .search-bar {
  position: absolute;
  top: 30px; left: 24px;
  width: 232px; height: 46px;
  background: #e9e9e9;
  border-radius: 8px;
}
/* 联系人条目 */
.wc-contacts-items {
  position: absolute;
  top: 97px; left: 84px;
  display: flex; flex-direction: column; gap: 8px;
}
.wc-contact-item { width: 280px; height: 80px; }
.wc-contact-item img { width: 100%; height: 100%; }

/* 分割线 */
.wc-vert-divider {
  position: absolute;
  top: 0; left: 364px;
  width: 1px; height: 640px;
}
.wc-vert-divider img { width: 100%; height: 100%; }

/* 聊天区 left:365 w:591 */
.wc-chat {
  flex: 1;
  background: #f5f5f5;
  display: flex; flex-direction: column;
  position: relative;
}
/* 顶部标题 h:76 */
.wc-chat-header {
  height: 76px;
  background: #fff;
  display: flex; align-items: center;
  padding: 0 34px;
  font-size: 20px;
  font-weight: 600;
  color: #000;
  flex-shrink: 0;
  border-bottom: 1px solid #d9d9d9;
}
/* 消息区 */
.wc-chat-body {
  flex: 1;
  padding: 20px 24px;
  display: flex; flex-direction: column; gap: 16px;
  overflow: hidden;
}

/* 消息气泡行 */
.msg-row { display: flex; align-items: flex-start; gap: 10px; }
.msg-row.me { flex-direction: row-reverse; }

.msg-avatar { width: 32px; height: 32px; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
.msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

.msg-bubble {
  max-width: 320px;
  background: #fff;
  border-radius: 0 6px 6px 6px;
  padding: 10px 14px;
  font-size: 16px; line-height: 26px; color: #000;
}
.msg-row.me .msg-bubble {
  background: #95ec69;
  border-radius: 6px 0 6px 6px;
}

/* 文件气泡 */
.file-bubble {
  background: #fff;
  border-radius: 0 6px 6px 6px;
  overflow: hidden;
  width: 204px;
}
.file-bubble img { width: 100%; height: auto; display: block; }

/* 底部输入区 h:161 */
.wc-input-area {
  height: 161px;
  flex-shrink: 0;
  border-top: 1px solid #d9d9d9;
  background: #fff;
  position: relative;
}
.wc-input-toolbar {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px 0;
}
.wc-input-toolbar img { width: 24px; height: 24px; }
.wc-input-box {
  padding: 8px 16px;
  font-size: 18px; line-height: 32px;
  color: #999;
  min-height: 40px;
}
.wc-input-box.typing { color: #000; }

/* AI 胶囊 (微信版) bottom:36 */
.wc-capsule {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  height: 60px;
  background: linear-gradient(135deg, #111827, #1e3a5f);
  border-radius: 40px;
  display: flex; align-items: center; gap: 14px;
  padding: 0 24px;
  opacity: 0;
  width: 60px;
  overflow: hidden;
  white-space: nowrap;
  box-shadow: 0 4px 24px rgba(0,0,0,0.35);
  transition: opacity 0.25s, width 0.45s cubic-bezier(0.34,1.4,0.64,1);
  pointer-events: none;
  z-index: 20;
}
.wc-capsule.show {
  opacity: 1;
  width: 500px;
  pointer-events: auto;
}

/* AI 键 (微信) bottom:36 left:50% */
.ai-orb-wc {
  position: absolute;
  bottom: 36px;
  left: 50%;
  transform: translateX(-50%);
  width: 32px; height: 32px;
  cursor: pointer;
  transition: transform 0.15s;
  z-index: 10;
}
.ai-orb-wc:hover { transform: translateX(-50%) scale(1.08); }
.ai-orb-wc:active { transform: translateX(-50%) scale(0.94); }
.ai-orb-wc .orb-outer { position:absolute;width:72px;height:72px;top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.3; }
.ai-orb-wc .orb-mid  { position:absolute;width:60px;height:60px;top:50%;left:50%;transform:translate(-50%,-50%); }
.ai-orb-wc .orb-inner{ position:absolute;width:48px;height:48px;top:50%;left:50%;transform:translate(-50%,-50%); }
.ai-orb-wc .orb-icon { position:absolute;width:48px;height:48px;top:50%;left:50%;transform:translate(-50%,-50%); }
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="switchScene('voice',this)">一键语音 · PDF 总结</div>
  <div class="tab" onclick="switchScene('input',this)">一键输入 · 微信回复</div>
</div>

<div class="scene-wrapper" id="wrapper">

  <!-- ========== SCENE 1: 一键语音 ========== -->
  <div class="scene active" id="scene-voice">
    <div class="bg-gradient"></div>

    <!-- PDF 白卡 -->
    <div class="voice-card">
      <div class="pdf-inner">
        <img src="assets/pdf-page.png" alt="PDF">
      </div>
    </div>

    <!-- AI 语音胶囊 -->
    <div class="voice-capsule" id="voice-capsule">
      <img class="capsule-bg-img" src="assets/capsule-bg.svg" alt="">
      <div class="capsule-mini-orb">
        <img class="cmo-glow1" src="assets/orb-rec-outer.png" alt="">
        <img class="cmo-glow2" src="assets/orb-rec-mid.png" alt="">
        <img class="cmo-glow3" src="assets/orb-rec-inner.png" alt="">
        <div class="cmo-circle"></div>
        <img class="cmo-ring2" src="assets/orb-rec-ring2.svg" alt="">
        <img class="cmo-ring3" src="assets/orb-rec-ring3.svg" alt="">
        <div class="cmo-bars">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
      <span class="capsule-label">总结一下这页内容</span>
    </div>

    <!-- AI 结果面板 -->
    <div class="ai-result-panel" id="ai-panel">
      <div class="panel-header">
        <img class="logo-mark" src="assets/tianxi-logo-mark.svg" alt="">
        <img class="logo-text" src="assets/tianxi-logo-text.svg" alt="天禧 AI">
      </div>
      <div class="panel-body" id="panel-text"></div>
      <div class="panel-input">
        <span>需要我帮你做什么</span>
        <div class="panel-input-icons">
          <img class="input-icon" src="assets/icon-input-add.svg" alt="">
          <div class="panel-mic-icon">
            <img class="mic-v" src="assets/icon-input-mic-v.svg" alt="">
            <img class="mic-u" src="assets/icon-input-mic-u.svg" alt="">
          </div>
          <div class="input-icon-divider"></div>
          <div class="input-icon-send">
            <img src="assets/icon-input-send.svg" width="11" height="11" alt="">
          </div>
        </div>
      </div>
    </div>

    <!-- AI 键 -->
    <div class="ai-orb" id="voice-orb" onclick="triggerVoice()">
      <img class="orb-outer" src="assets/orb-idle-outer.png" alt="">
      <img class="orb-mid"   src="assets/orb-idle-mid.png" alt="">
      <img class="orb-inner" src="assets/orb-idle-inner.png" alt="">
      <img class="orb-icon"  src="assets/orb-idle-icon.svg" alt="">
      <!-- 录音状态替换图层 -->
      <img class="orb-rec-outer" src="assets/orb-rec-outer.png" alt="">
      <img class="orb-rec-mid"   src="assets/orb-rec-mid.png" alt="">
      <img class="orb-rec-inner" src="assets/orb-rec-inner.png" alt="">
      <div class="orb-eq">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div class="hint" id="voice-hint">点击 AI 键体验</div>
  </div>


  <!-- ========== SCENE 2: 一键输入 ========== -->
  <div class="scene" id="scene-input">
    <div class="bg-gradient"></div>

    <!-- 微信窗口 -->
    <div class="wc-window">

      <!-- 左侧 sidebar -->
      <div class="wc-sidebar">
        <div class="avatar-wrap">
          <img src="assets/wc-avatar-circle.png" alt="">
        </div>
        <div class="wc-nav-icons">
          <img src="assets/wc-nav-chat.svg" alt="">
          <img src="assets/wc-nav-contacts.svg" alt="">
          <img src="assets/wc-nav-moments.svg" alt="">
        </div>
        <img class="settings-icon" src="assets/wc-nav-settings.svg" alt="">
      </div>

      <!-- 联系人列表（通过设计稿图片还原） -->
      <div class="wc-contacts-list">
        <img class="bg-img" src="assets/wc-left-bg.svg" alt="">
        <div class="search-bar"></div>
        <div class="wc-contacts-items">
          <div class="wc-contact-item"><img src="assets/wc-contact1.svg" alt=""></div>
          <div class="wc-contact-item"><img src="assets/wc-contact2.svg" alt=""></div>
          <div class="wc-contact-item"><img src="assets/wc-contact3.svg" alt=""></div>
          <div class="wc-contact-item"><img src="assets/wc-contact4.svg" alt=""></div>
        </div>
        <div class="wc-vert-divider"><img src="assets/wc-divider.svg" alt=""></div>
      </div>

      <!-- 聊天区 -->
      <div class="wc-chat">
        <div class="wc-chat-header">报价单</div>
        <div class="wc-chat-body">
          <!-- 我发的文字 -->
          <div class="msg-row me">
            <div class="msg-avatar"><img src="assets/wc-avatar-me.png" alt=""></div>
            <div class="msg-bubble">宇总，我把报价单发您</div>
          </div>
          <!-- 我发的文件 -->
          <div class="msg-row me">
            <div class="msg-avatar"><img src="assets/wc-avatar-me.png" alt=""></div>
            <div class="file-bubble">
              <img src="assets/wc-file-bubble.png" alt="">
            </div>
          </div>
          <!-- 对方回复 -->
          <div class="msg-row other">
            <div class="msg-avatar"><img src="assets/wc-avatar-other.png" alt=""></div>
            <div class="msg-bubble">周经理，你们报价比别家贵 30% 啊</div>
          </div>
        </div>

        <!-- 输入区 -->
        <div class="wc-input-area">
          <div class="wc-input-toolbar">
            <img src="assets/wc-icon-emoji.svg" alt="">
            <img src="assets/wc-icon-scissors.svg" alt="">
            <img src="assets/wc-icon-folder.svg" alt="">
          </div>
          <div class="wc-input-box" id="wc-input">输入消息…</div>
        </div>
      </div>
    </div>

    <!-- AI 胶囊 (微信) -->
    <div class="wc-capsule" id="wc-capsule">
      <div class="capsule-wave">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <span class="capsule-label">回复客户，委婉说明我们价格高是因为服务好</span>
    </div>

    <!-- AI 键 -->
    <div class="ai-orb-wc" id="wc-orb" onclick="triggerInput()">
      <img class="orb-outer" src="assets/orb-outer.png" alt="">
      <img class="orb-mid"   src="assets/orb-mid.png" alt="">
      <img class="orb-inner" src="assets/orb-inner.png" alt="">
      <img class="orb-icon"  src="assets/orb-icon.svg" alt="">
    </div>

    <div class="hint" id="input-hint">点击 AI 键体验</div>
  </div>

</div>

<script src="assets/ai-water-interactions.js"></script>
<script>
// 缩放适配
function scaleScene() {
  const wrapper = document.getElementById('wrapper');
  const availW = window.innerWidth - 32;
  const availH = window.innerHeight - 80;
  const scale = Math.min(availW / 1440, availH / 900);
  wrapper.style.transform = `scale(${scale})`;
}
scaleScene();
window.addEventListener('resize', scaleScene);

// 切换场景
function switchScene(name, el) {
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('scene-' + name).classList.add('active');
  el.classList.add('active');
  resetAll();
}

function resetAll() {
  // voice
  stopRipple();
  document.getElementById('voice-capsule').classList.remove('show');
  document.getElementById('ai-panel').classList.remove('show');
  document.getElementById('panel-text').textContent = '';
  document.getElementById('voice-hint').classList.remove('hide');
  document.getElementById('voice-orb').classList.remove('recording');
  document.getElementById('voice-orb').classList.remove('hidden');
  document.getElementById('voice-orb').classList.remove('breathing');
  voiceState = 0;
  if (voiceTimer) clearTimeout(voiceTimer);
  // 重置后重新自动播放
  if (document.getElementById('scene-voice').classList.contains('active')) {
    startVoiceFlow();
  }

  // input
  document.getElementById('wc-capsule').classList.remove('show');
  const inputEl = document.getElementById('wc-input');
  inputEl.textContent = '输入消息…';
  inputEl.classList.remove('typing');
  document.getElementById('input-hint').classList.remove('hide');
  // 清除动态追加的发送气泡
  document.querySelectorAll('#scene-input .msg-sent').forEach(el => el.remove());
  inputState = 0;
  if (inputTimer) clearTimeout(inputTimer);
}

// ====== Scene 1: 一键语音 ======
let voiceState = 0, voiceTimer = null;
const PDF_SUMMARY = '本页是《2026 AI Index 报告》，聚焦知名 AI 模型。基于 Epoch AI 数据集，分析2025年知名AI模型分布：美国以59个领先，中国35个、韩国8个紧随其后，主要地区新模型发布量同比下降。';

// ---- 水波纹（AIWater WaterRippleLayer） ----
let rippleLayer = null;

function buildRippleBackground(ctx, w, h) {
  // 和 scene-voice 背景一致：浅暖白渐变
  const g = ctx.createLinearGradient(0, 0, w * 0.6, h);
  g.addColorStop(0, '#f5f4ed');
  g.addColorStop(1, '#d6ce97');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
  // 叠加白卡（PDF 区域）
  ctx.fillStyle = 'rgba(255,255,255,0.82)';
  const cardX = w * (300/1440), cardY = h * (120/900);
  const cardW = w * (840/1440), cardH = h * (780/900);
  ctx.fillRect(cardX, cardY, cardW, cardH);
}

function initRipple() {
  if (rippleLayer) { rippleLayer.destroy(); rippleLayer = null; }
  const sceneEl = document.getElementById('scene-voice');
  rippleLayer = AIWater.createWaterRippleLayer({
    target: sceneEl,
    fullScreen: false,
    autoPlay: false,
    loop: false,
    duration: 1400,
    sourceX: 0.5,
    sourceY: 1.06,
    opacity: 0.92,
    scale: 0.62
  });
  rippleLayer.setBackground(buildRippleBackground);
}

function playRipple(onComplete) {
  if (!rippleLayer) initRipple();
  rippleLayer.looping = false;
  rippleLayer.play();
  setTimeout(() => { onComplete?.(); }, 1500);
}

function stopRipple() {
  if (rippleLayer) rippleLayer.stop();
}

function startVoiceFlow() {
  playRipple(() => {
    // 水波纹结束 → 呼吸
    const orb = document.getElementById('voice-orb');
    orb.classList.add('breathing');
    voiceTimer = setTimeout(() => {
      orb.classList.remove('breathing');
      orb.classList.add('hidden');
      document.getElementById('voice-hint').classList.add('hide');
      voiceState = 1;
      voiceTimer = setTimeout(() => {
        document.getElementById('voice-capsule').classList.add('show');
        voiceTimer = setTimeout(() => {
          document.getElementById('voice-capsule').classList.remove('show');
          voiceTimer = setTimeout(() => {
            document.getElementById('ai-panel').classList.add('show');
            typewrite('panel-text', PDF_SUMMARY, 20);
            voiceState = 2;
          }, 500);
        }, 1800);
      }, 400);
    }, 1500);
  });
}

function triggerVoice() {
  if (voiceState === 2) {
    resetAll();
  }
}

function typewrite(id, text, speed) {
  const el = document.getElementById(id);
  el.textContent = '';
  let i = 0;
  function next() {
    if (i < text.length) {
      el.textContent += text[i++];
      voiceTimer = setTimeout(next, speed);
    }
  }
  next();
}

// ====== Scene 2: 一键输入 ======
let inputState = 0, inputTimer = null;
const WC_REPLY = '宇总，理解您的顾虑。我方定价略高于同行，只因交付、品控与服务均执行更高标准。';

function triggerInput() {
  if (inputState === 0) {
    document.getElementById('input-hint').classList.add('hide');
    document.getElementById('wc-capsule').classList.add('show');
    inputState = 1;
    inputTimer = setTimeout(() => {
      document.getElementById('wc-capsule').classList.remove('show');
      inputTimer = setTimeout(() => {
        const inputEl = document.getElementById('wc-input');
        inputEl.textContent = '';
        inputEl.classList.add('typing');
        typeInput(inputEl, WC_REPLY, 30, () => {
          // 打字完成 → 发送：清空输入框，追加气泡
          inputTimer = setTimeout(() => {
            inputEl.textContent = '输入消息…';
            inputEl.classList.remove('typing');
            sendBubble(WC_REPLY);
            inputState = 3;
          }, 400);
        });
        inputState = 2;
      }, 280);
    }, 1600);
  } else if (inputState === 3) {
    resetAll();
  }
}

function typeInput(el, text, speed, onDone) {
  let i = 0;
  function next() {
    if (i < text.length) {
      el.textContent += text[i++];
      inputTimer = setTimeout(next, speed);
    } else {
      onDone?.();
    }
  }
  next();
}

function sendBubble(text) {
  const chatBody = document.querySelector('#scene-input .wc-chat-body');
  const row = document.createElement('div');
  row.className = 'msg-row me msg-sent';
  row.innerHTML = `
    <div class="msg-avatar"><img src="assets/wc-avatar-me.png" alt=""></div>
    <div class="msg-bubble" id="sent-bubble"></div>
  `;
  // 先以 opacity 0 插入，然后 fade in
  row.style.opacity = '0';
  row.style.transition = 'opacity 0.25s ease';
  chatBody.appendChild(row);
  chatBody.scrollTop = chatBody.scrollHeight;
  // 触发 fade in
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { row.style.opacity = '1'; });
  });
  // 逐字打出气泡内容
  const bubble = document.getElementById('sent-bubble');
  let i = 0;
  function next() {
    if (i < text.length) {
      bubble.textContent += text[i++];
      chatBody.scrollTop = chatBody.scrollHeight;
      inputTimer = setTimeout(next, 28);
    }
  }
  setTimeout(next, 200);
}
// 页面加载后自动启动
initRipple();
startVoiceFlow();
</script>
</body>
</html>
